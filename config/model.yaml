default_context_tokens: 4096
token_estimate_ratio: 4.0
context_reserve: 512
system_prompt: "You are a helpful assistant."
summary_model: null
summarize_prompt: >-
  Summarize the following conversation in under 200 words.
  Preserve key facts, decisions, and any instructions the user gave.
  Respond with only the summary, no preamble.
title_prompt: >-
  Give this conversation a short title (under 8 words).
  Respond with only the title, no quotes or punctuation.
title_after_exchanges: 1
max_input_chars: 32000
greeting_prompt: >-
  You are an assistant named "{name}". Your role is described by this system prompt:
  {system_prompt}
  Generate between 5 and {count} short, unique greeting messages (1-2 sentences each) that you
  would use to welcome a user at the start of a new conversation. Each greeting should reflect
  your personality and capabilities. Write one greeting per line. No numbering, no quotes, no
  bullet points, no other text.
greeting_count: 10
system_prompt_wrapper: >-
  {user_prompt}


  ## Behavioral Guidelines

  - Match the user's verbosity: short messages get short answers.

  - Do not list your capabilities or repeat your role after the first exchange.

  - Stay within your defined scope. If asked something outside it, say so briefly.

  - Be direct. No filler phrases, no flattery, no unnecessary caveats.

  - When the user gives context or constraints, follow them precisely.
